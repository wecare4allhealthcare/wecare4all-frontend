<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/img/logo/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/assets/img/logo/icon-192.png" />
    <!-- iOS Safari doesn't read the manifest for "Add to Home Screen" styling
         the way Android/Chrome does — these meta tags are what it actually
         uses instead. apple-mobile-web-app-title keeps the home-screen label
         short ("We Care 4 all" rather than the long <title>). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="We Care 4 all" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="We Care 4 'all' — Connect with verified specialist doctors for video consultations, book professional home healthcare visits, and access a trusted network of 50+ partner hospitals. Your health, our priority."
    />
    <meta name="theme-color" content="#0b1f3a" />
    <title>We Care 4 'all' — Healthcare Consultancy & Patient Coordination Platform</title>

    <!-- Open Graph / social link previews. Per-page <SEO> updates these via
         JS for Google's benefit (Google renders JS before indexing), but
         WhatsApp/Facebook/LinkedIn-style crawlers don't run JS at all — they
         only ever read what's here, no matter which page got shared. Keep
         this generic block accurate and decent-looking since it's the
         fallback for every single link shared from this site. -->
    <meta property="og:title" content="We Care 4 'all' — Healthcare Consultancy & Patient Coordination" />
    <meta property="og:description" content="Connect with verified specialist doctors for video consultations, book professional home healthcare visits, and access a trusted network of 50+ partner hospitals." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="We Care 4 'all'" />
    <meta property="og:image" content="/assets/img/logo/logo-light.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="We Care 4 'all' — Healthcare Consultancy & Patient Coordination" />
    <meta name="twitter:description" content="Connect with verified specialist doctors for video consultations, book professional home healthcare visits, and access a trusted network of 50+ partner hospitals." />
    <meta name="twitter:image" content="/assets/img/logo/logo-light.png" />

    <!-- Google Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Elfsight Google Reviews Widget (add your widget ID in Home.jsx) -->
    <!-- Uncomment after setting up Elfsight account -->
    <script src="https://elfsightcdn.com/platform.js" async></script>
    <script
      src="https://cdn.commoninja.com/sdk/latest/commonninja.js"
      defer
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
